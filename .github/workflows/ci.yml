name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install locked dependencies
        run: bun ci

      - name: Type-check components
        run: bun run check

      - name: Validate registry
        run: bun run registry:validate

      - name: Build component study
        run: bun run build

      - name: Build documentation
        run: bun run docs:build

      - name: Verify generated registry is committed
        run: git diff --exit-code -- public/r apps/docs/public/r
